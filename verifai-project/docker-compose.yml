version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: verifai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: verifai
      POSTGRES_PASSWORD: verifai_pass
      POSTGRES_DB: verifai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - verifai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verifai"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: verifai-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - verifai-net
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: verifai-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - verifai-net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  verifai-net:
    driver: bridge
